name: Waka Time

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

permissions:
  contents: write
jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch top WakaTime projects
        id: wakatime_projects
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: |
          set -euo pipefail
          response=$(curl -fsSL -u "${WAKATIME_API_KEY}:" "https://wakatime.com/api/v1/users/current/stats/last_7_days")
          projects=$(echo "${response}" | jq -er '.data.projects | sort_by(-.total_seconds) | .[0:3] | map(.name) | join(", ")')
          if [ -z "${projects}" ] || [ "${projects}" = "null" ]; then
            echo "Unable to determine top WakaTime projects." >&2
            exit 1
          fi
          echo "projects=${projects}" >> "${GITHUB_OUTPUT}"

      - name: Update README placeholders
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          TOP_PROJECTS: ${{ steps.wakatime_projects.outputs.projects }}
        run: |
          if [ -z "${CONTACT_EMAIL}" ]; then
            echo "CONTACT_EMAIL is not set." >&2
            exit 1
          fi
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          readme_path = Path("README.md")
          content = readme_path.read_text(encoding="utf-8")

          projects = os.environ.get("TOP_PROJECTS")
          email = os.environ.get("CONTACT_EMAIL")
          if not projects:
              raise SystemExit("TOP_PROJECTS was not provided.")
          if not email:
              raise SystemExit("CONTACT_EMAIL was not provided.")

          content, project_count = re.subn(
              r"- 🔭 I’m currently working on \*\*.*?\*\*",
              f"- 🔭 I’m currently working on **{projects}**",
              content,
          )
          content, email_count = re.subn(
              r"- 📫 How to reach me: \*\*.*?\*\*",
              f"- 📫 How to reach me: **{email}**",
              content,
          )

          if project_count == 0:
              raise SystemExit("Project placeholder was not found.")
          if email_count == 0:
              raise SystemExit("Email placeholder was not found.")

          readme_path.write_text(content, encoding="utf-8")
          PY

      - name: Commit README placeholder updates
        run: |
          if git diff --quiet README.md; then
            echo "No README placeholder updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update README placeholders"
          for attempt in 1 2 3; do
            if ! git pull --rebase --autostash origin "${{ github.ref_name }}"; then
              git rebase --abort || true
              echo "Rebase failed; refusing to push README updates." >&2
              exit 1
            fi
            if git push --force-with-lease origin "HEAD:${{ github.ref_name }}"; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying..." >&2
            sleep $((attempt * 5))
          done
          echo "Failed to push README updates after retries." >&2
          exit 1

      - uses: anmol098/waka-readme-stats@v5
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_LINES_OF_CODE : "False"
          SHOW_PROFILE_VIEWS : "True"
          SHOW_LANGUAGE_PER_REPO : "True"
          SHOW_LOC_CHART : "False"
          SHOW_SHORT_INFO : "False"
          SHOW_PROJECTS : "False"
          SHOW_TOTAL_CODE_TIME : "True"
          SHOW_UPDATED_DATE: "True"
          SHOW_COMMIT: "False"
          SHOW_DAYS_OF_WEEK: "False"
          SHOW_TIMEZONE: "False"
